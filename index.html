<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rincones del Mundo – Galería de Viajes</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <header>
    <h1>Rincones del Mundo</h1>
    <p class="tagline">Una galería de lugares que cambian la perspectiva</p>
  </header>

  <main>

    <figure>
      <img
        src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80"
        alt="Montañas nevadas con un lago alpino cristalino en primer plano al amanecer"
      />
      <figcaption>
        <h2>Los Alpes Suizos</h2>
        <p>
          El silencio de las cumbres alpinas solo se rompe con el crujir de la nieve bajo los pies. 
          Aquí, entre picos que rozan las nubes, la escala humana se vuelve insignificante 
          y maravillosa al mismo tiempo.
        </p>
      </figcaption>
    </figure>

    <figure>
      <img
        src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=80"
        alt="Campos de lavanda en Provenza, Francia, bajo un cielo azul intenso al atardecer"
      />
      <figcaption>
        <h2>Provenza, Francia</h2>
        <p>
          Cada verano, el sur de Francia se tiñe de violeta. Los campos de lavanda 
          perfuman el aire caliente de julio y atraen a viajeros que buscan ese 
          instante fotográfico perfecto entre la tierra y el cielo.
        </p>
      </figcaption>
    </figure>

    <figure>
      <img
        src="https://images.unsplash.com/photo-1518548419970-58e3b4079ab2?w=800&q=80"
        alt="Templo de Angkor Wat reflejado en el agua al amanecer en Camboya"
      />
      <figcaption>
        <h2>Angkor Wat, Camboya</h2>
        <p>
          Construido en el siglo XII, Angkor Wat es la estructura religiosa más grande 
          del mundo. Al alba, su reflejo perfecto en los estanques ceremoniales crea 
          una simetría que desafía el tiempo y la razón.
        </p>
      </figcaption>
    </figure>

    <figure>
      <img
        src="https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=800&q=80"
        alt="Aurora boreal de colores verde y violeta sobre un paisaje ártico nevado en Noruega"
      />
      <figcaption>
        <h2>Aurora Boreal, Noruega</h2>
        <p>
          Ninguna fotografía captura del todo la experiencia de ver la aurora boreal 
          en vivo. Los colores bailan en silencio sobre el ártico noruego como si el 
          cielo mismo estuviera siendo pintado en tiempo real.
        </p>
      </figcaption>
    </figure>

    <figure>
      <img
        src="https://images.unsplash.com/photo-1523978591478-c753949ff840?w=800&q=80"
        alt="Calle colorida y animada de Cartagena de Indias, Colombia, con balcones llenos de flores"
      />
      <figcaption>
        <h2>Cartagena, Colombia</h2>
        <p>
          La ciudad amurallada de Cartagena es un festín de color. Sus calles coloniales 
          guardan siglos de historia mezclada con la alegría caribeña, el aroma del café 
          y la música que se cuela por cada ventana.
        </p>
      </figcaption>
    </figure>

    <figure>
      <img
        src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=800&q=80"
        alt="Monte Fuji cubierto de nieve al fondo, con árboles de cerezo en flor en primer plano en Japón"
      />
      <figcaption>
        <h2>Monte Fuji, Japón</h2>
        <p>
          El Monte Fuji es más que una montaña: es un símbolo nacional, un objeto de 
          contemplación espiritual y uno de los paisajes más reconocibles del planeta. 
          Verlo en persona, enmarcado por cerezos en flor, es un regalo irreemplazable.
        </p>
      </figcaption>
    </figure>

  </main>

  <footer>
    <p>&copy; 2025 Rincones del Mundo · Galería de Viajes Responsiva</p>
  </footer>

</body>
</html>
